<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Weather Checker</h1>
    <button onclick="checkTemperature()">Check Temperature</button>
    <p id="result"></p>

    <script>
        function checkTemperature() {
            let temperature = Number(prompt("Please enter today's temperature in °C:"));
            if (temperature > 30) {
                document.getElementById("result").innerText = "Hot Day";
            } else {
                document.getElementById("result").innerText = "Pleasant Weather";
            }
        }
    </script>
</body>
</html>
